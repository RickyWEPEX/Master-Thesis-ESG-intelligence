# ===========================================================================
# ESRS S3 (Betroffene Gemeinschaften) - Datenpunktkatalog
# ---------------------------------------------------------------------------
# Quelle: Amended ESRS Exposure Draft, Juli 2025 (EFRAG), DR S3-1 bis S3-5
