  - id: E1-DP-028
    dr: E1-11
    name: "Assets at material physical risk (%)"
    name_de: "Anteil Vermoegenswerte mit materiellem physischem Risiko"
    category: financial_effects
    datatype: percentage
    unit: "%"
    mandatory: false
    value_path: financial_effects.assets_at_physical_risk_percent
    validation: {min: 0, max: 100}

  # --- Narrative Offenlegungen (DR E1-1, E1-2, E1-3, SBM-3) ---------------
  - id: E1-DP-029
    dr: E1-1
    name: "Transition plan for climate change mitigation"
    name_de: "Transitionsplan zur Klimaschutzminderung"
    category: narrative
    datatype: narrative
    unit: text
    mandatory: true
    value_path: narratives.transition_plan

  - id: E1-DP-030
    dr: E1-2
    name: "Policies related to climate change mitigation and adaptation"
    name_de: "Konzepte zu Klimaschutz und -anpassung"
    category: narrative
    datatype: narrative
    unit: text
    mandatory: true
    value_path: narratives.climate_policies

  - id: E1-DP-031
    dr: E1-3
    name: "Actions and resources for climate change policies"
    name_de: "Massnahmen und Ressourcen zu Klimakonzepten"
    category: narrative
    datatype: narrative
    unit: text
    mandatory: true
    value_path: narratives.climate_actions

  - id: E1-DP-032
    dr: E1-SBM-3
    name: "Material physical climate risks"
    name_de: "Materielle physische Klimarisiken"
    category: narrative
    datatype: narrative
    unit: text
    mandatory: true
    value_path: narratives.physical_risks

  - id: E1-DP-033
    dr: E1-SBM-3
    name: "Material transition climate risks"
    name_de: "Materielle transitorische Klimarisiken"
    category: narrative
    datatype: narrative
    unit: text
    mandatory: true
    value_path: narratives.transition_risks

  - id: E1-DP-034
    dr: E1-SBM-3
    name: "Material climate-related opportunities"
    name_de: "Materielle klimabezogene Chancen"
    category: narrative
    datatype: narrative
    unit: text
    mandatory: false
    value_path: narratives.climate_opportunities

  # ===========================================================================
  # H3a-Demonstration: 10 zusaetzliche Datenpunkte via YAML (kein Code benoetigt)
  # Quelle: Amended ESRS Exposure Drafts Juli 2025 + EBA Pillar 3 ESG
  # Ergaenzt: Mai 2026 - Nachweis der YAML-Konfigurierbarkeit (NFA-3.2 / H3a)
  # ===========================================================================

  - id: E1-DP-035
    dr: E1-6
    name: "Scope 3 Cat. 3 - Fuel and energy related activities"
    name_de: "Scope 3 Kat. 3 - Brennstoff- und energiebezogene Aktivitaeten"
    category: emissions
    datatype: numeric
    unit: tCO2e
    mandatory: false
    value_path: emissions.scope_3_categories.cat_3_fuel_energy
    validation: {min: 0}

  - id: E1-DP-036
    dr: E1-6
    name: "Scope 3 Cat. 11 - Use of sold products"
    name_de: "Scope 3 Kat. 11 - Nutzung verkaufter Produkte"
    category: emissions
    datatype: numeric
    unit: tCO2e
    mandatory: false
    value_path: emissions.scope_3_categories.cat_11_sold_products
    validation: {min: 0}

  - id: E1-DP-037
    dr: E1-6
    name: "GHG intensity per full-time equivalent"
    name_de: "THG-Intensitaet je Vollzeitaequivalent (FTE)"
    category: intensity
    datatype: numeric
    unit: "tCO2e/FTE"
    mandatory: false
    value_path: intensity.ghg_intensity_per_fte
    validation: {min: 0}

  - id: E1-DP-038
    dr: E1-11
    name: "Green Asset Ratio (GAR) - EU Taxonomy aligned assets"
    name_de: "Green Asset Ratio (GAR) - EU-Taxonomie-konforme Vermoegenswerte"
    category: financial_effects
