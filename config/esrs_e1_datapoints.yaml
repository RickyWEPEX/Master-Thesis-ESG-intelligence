# ===========================================================================
# ESRS E1 (Klimawandel) - Datenpunktkatalog
# ---------------------------------------------------------------------------
# Quelle: Amended ESRS Exposure Draft, Juli 2025 (EFRAG), DR E1-1 bis E1-11
# Zweck:  Konfigurierbarer Katalog. Neue/geaenderte Datenpunkte sind ohne
#         Code-Aenderung integrierbar (NFA-3.2 / Hypothese H3a, H3c).
#
# Feldsemantik je Datenpunkt:
#   id          eindeutige Datenpunkt-ID
#   dr          zugehoeriges Disclosure Requirement (E1-1 .. E1-11)
#   name / name_de  Bezeichnung (EFRAG-Taxonomie, FA-5.6)
#   category    Gruppierung (emissions | energy | targets | intensity |
#               removals | carbon_pricing | financial_effects | narrative)
#   datatype    numeric | integer | percentage | year | narrative
#   unit        Messeinheit (tCO2e, MWh, %, EUR, ...)
#   mandatory   true = Pflichtangabe (Vollstaendigkeitspruefung FA-3.1)
#   value_path  Pfad in den Unternehmensdaten (Punktnotation)
#   validation  optionale Wertgrenzen (siehe auch validation_rules.yaml)
# ===========================================================================

metadata:
  standard: "ESRS E1"
  title: "Climate Change / Klimawandel"
  source: "Amended ESRS Exposure Draft (July 2025), EFRAG"
  catalog_version: "0.1.0"
  note: >
    Repraesentativer, erweiterbarer Auszug der E1-Datenpunkte. Die DR-Nummerierung
    folgt dem Amended ED (Juli 2025). Vollausbau auf den vollstaendigen Katalog
    erfolgt durch Ergaenzung weiterer Eintraege - ohne Code-Aenderung.

categories:
  emissions: "THG-Emissionen (Scope 1/2/3)"
  energy: "Energieverbrauch und -mix"
  targets: "Emissionsreduktionsziele / Transitionsplan"
  intensity: "Intensitaetskennzahlen"
  removals: "THG-Entnahmen und Carbon Credits"
  carbon_pricing: "Internes Carbon Pricing"
  financial_effects: "Antizipierte finanzielle Effekte"
  narrative: "Narrative Offenlegungen"

datapoints:

  # --- DR E1-6: Brutto-THG-Emissionen ------------------------------------
  - id: E1-DP-001
    dr: E1-6
    name: "Gross Scope 1 GHG emissions"
    name_de: "Brutto Scope-1-THG-Emissionen"
    category: emissions
    datatype: numeric
    unit: tCO2e
    mandatory: true
    value_path: emissions.scope_1_tco2e
    validation: {min: 0}

  - id: E1-DP-002
    dr: E1-6
    name: "Percentage of Scope 1 emissions from regulated ETS"
    name_de: "Anteil Scope-1-Emissionen aus regulierten Emissionshandelssystemen"
    category: emissions
    datatype: percentage
    unit: "%"
    mandatory: false
    value_path: emissions.scope_1_ets_percent
    validation: {min: 0, max: 100}

  - id: E1-DP-003
    dr: E1-6
    name: "Gross Scope 2 GHG emissions (location-based)"
    name_de: "Brutto Scope-2-THG-Emissionen (standortbasiert)"
    category: emissions
    datatype: numeric
    unit: tCO2e
    mandatory: true
    value_path: emissions.scope_2_location_tco2e
    validation: {min: 0}

  - id: E1-DP-004
    dr: E1-6
    name: "Gross Scope 2 GHG emissions (market-based)"
    name_de: "Brutto Scope-2-THG-Emissionen (marktbasiert)"
    category: emissions
    datatype: numeric
    unit: tCO2e
    mandatory: true
    value_path: emissions.scope_2_market_tco2e
    validation: {min: 0}

  - id: E1-DP-005
    dr: E1-6
    name: "Gross Scope 3 GHG emissions (total)"
    name_de: "Brutto Scope-3-THG-Emissionen (gesamt)"
    category: emissions
    datatype: numeric
    unit: tCO2e
    mandatory: true
    value_path: emissions.scope_3_total_tco2e
    validation: {min: 0}

  - id: E1-DP-006
    dr: E1-6
    name: "Total GHG emissions (location-based)"
    name_de: "Gesamte THG-Emissionen (standortbasiert)"
    category: emissions
    datatype: numeric
    unit: tCO2e
    mandatory: true
    value_path: emissions.total_ghg_location_tco2e
    validation: {min: 0}

  - id: E1-DP-007
    dr: E1-6
    name: "Total GHG emissions (market-based)"
    name_de: "Gesamte THG-Emissionen (marktbasiert)"
    category: emissions
    datatype: numeric
    unit: tCO2e
    mandatory: true
    value_path: emissions.total_ghg_market_tco2e
    validation: {min: 0}

  - id: E1-DP-008
    dr: E1-6
    name: "Biogenic CO2 emissions (reported separately)"
    name_de: "Biogene CO2-Emissionen (separat ausgewiesen)"
    category: emissions
    datatype: numeric
    unit: tCO2e
    mandatory: false
    value_path: emissions.biogenic_co2_tco2e
    validation: {min: 0}

  # Scope-3-Kategorien (GHG Protocol Corporate Value Chain) - Auswahl materieller Kategorien
  - id: E1-DP-009
    dr: E1-6
    name: "Scope 3 Cat. 1 - Purchased goods and services"
    name_de: "Scope 3 Kat. 1 - Eingekaufte Gueter und Dienstleistungen"
    category: emissions
    datatype: numeric
    unit: tCO2e
    mandatory: false
    value_path: emissions.scope_3_categories.cat_1_purchased_goods
    validation: {min: 0}

  - id: E1-DP-010
    dr: E1-6
    name: "Scope 3 Cat. 6 - Business travel"
    name_de: "Scope 3 Kat. 6 - Geschaeftsreisen"
    category: emissions
    datatype: numeric
    unit: tCO2e
    mandatory: false
    value_path: emissions.scope_3_categories.cat_6_business_travel
    validation: {min: 0}

  - id: E1-DP-011
    dr: E1-6
    name: "Scope 3 Cat. 7 - Employee commuting"
    name_de: "Scope 3 Kat. 7 - Pendelverkehr der Mitarbeitenden"
    category: emissions
    datatype: numeric
    unit: tCO2e
    mandatory: false
    value_path: emissions.scope_3_categories.cat_7_employee_commuting
    validation: {min: 0}

  - id: E1-DP-012
    dr: E1-6
    name: "Scope 3 Cat. 15 - Investments (financed emissions)"
    name_de: "Scope 3 Kat. 15 - Investitionen (finanzierte Emissionen)"
    category: emissions
    datatype: numeric
    unit: tCO2e
    mandatory: true   # fuer Finanzinstitute regelmaessig wesentlich
    value_path: emissions.scope_3_categories.cat_15_investments
    validation: {min: 0}

  # --- DR E1-4: Energieverbrauch und -mix --------------------------------
  - id: E1-DP-013
    dr: E1-4
    name: "Total energy consumption"
    name_de: "Gesamtenergieverbrauch"
    category: energy
    datatype: numeric
    unit: MWh
    mandatory: true
    value_path: energy.total_consumption_mwh
    validation: {min: 0}

  - id: E1-DP-014
    dr: E1-4
    name: "Energy consumption from fossil sources"
    name_de: "Energieverbrauch aus fossilen Quellen"
    category: energy
    datatype: numeric
    unit: MWh
    mandatory: true
    value_path: energy.fossil_mwh
    validation: {min: 0}

  - id: E1-DP-015
    dr: E1-4
    name: "Energy consumption from nuclear sources"
    name_de: "Energieverbrauch aus nuklearen Quellen"
    category: energy
    datatype: numeric
    unit: MWh
    mandatory: true
    value_path: energy.nuclear_mwh
    validation: {min: 0}

  - id: E1-DP-016
    dr: E1-4
    name: "Energy consumption from renewable sources"
    name_de: "Energieverbrauch aus erneuerbaren Quellen"
    category: energy
    datatype: numeric
    unit: MWh
    mandatory: true
    value_path: energy.renewable_mwh
    validation: {min: 0}

  - id: E1-DP-017
    dr: E1-4
    name: "Share of renewable energy"
    name_de: "Anteil erneuerbarer Energie"
    category: energy
    datatype: percentage
    unit: "%"
    mandatory: true
    value_path: energy.renewable_share_percent
    validation: {min: 0, max: 100}

  - id: E1-DP-018
    dr: E1-4
    name: "Energy intensity (per net revenue)"
    name_de: "Energieintensitaet (je Nettoumsatz)"
    category: intensity
    datatype: numeric
    unit: "MWh/Mio EUR"
    mandatory: false
    value_path: energy.energy_intensity_mwh_per_mio_eur
    validation: {min: 0}

  # --- DR E1-5/E1-4: Ziele & Transitionsplan -----------------------------
  - id: E1-DP-019
    dr: E1-5
    name: "GHG emission reduction target (base year)"
    name_de: "THG-Reduktionsziel - Basisjahr"
    category: targets
    datatype: year
    unit: "year"
    mandatory: true
    value_path: targets.base_year
    validation: {min: 1990, max: 2050}

  - id: E1-DP-020
    dr: E1-5
    name: "GHG emission reduction target (target year)"
    name_de: "THG-Reduktionsziel - Zieljahr"
    category: targets
    datatype: year
    unit: "year"
    mandatory: true
    value_path: targets.target_year
    validation: {min: 2020, max: 2100}

  - id: E1-DP-021
    dr: E1-5
    name: "GHG reduction target (gross, %)"
    name_de: "THG-Reduktionsziel (Brutto, %)"
    category: targets
    datatype: percentage
    unit: "%"
    mandatory: true
    value_path: targets.reduction_target_percent
    validation: {min: 0, max: 100}

  - id: E1-DP-022
    dr: E1-1
    name: "Net-zero target year"
    name_de: "Zieljahr Netto-Null"
    category: targets
    datatype: year
    unit: "year"
    mandatory: false
    value_path: targets.net_zero_year
    validation: {min: 2030, max: 2100}

  # --- DR E1-6: Intensitaetskennzahl -------------------------------------
  - id: E1-DP-023
    dr: E1-6
    name: "GHG intensity per net revenue"
    name_de: "THG-Intensitaet je Nettoumsatz"
    category: intensity
    datatype: numeric
    unit: "tCO2e/Mio EUR"
    mandatory: true
    value_path: intensity.ghg_intensity_per_revenue
    validation: {min: 0}

  # --- DR E1-9: THG-Entnahmen & Carbon Credits ---------------------------
  - id: E1-DP-024
    dr: E1-9
    name: "GHG removals (own operations and value chain)"
    name_de: "THG-Entnahmen (eigene Betriebe und Wertschoepfungskette)"
    category: removals
    datatype: numeric
    unit: tCO2e
    mandatory: false
    value_path: removals.ghg_removals_tco2e
    validation: {min: 0}

  - id: E1-DP-025
    dr: E1-9
    name: "Carbon credits purchased/cancelled"
    name_de: "Erworbene/stornierte Carbon Credits"
    category: removals
    datatype: numeric
    unit: tCO2e
    mandatory: false
    value_path: removals.carbon_credits_tco2e
    validation: {min: 0}

  # --- DR E1-10: Internes Carbon Pricing ---------------------------------
  - id: E1-DP-026
    dr: E1-10
    name: "Internal carbon price applied"
    name_de: "Angewandter interner CO2-Preis"
    category: carbon_pricing
    datatype: numeric
    unit: "EUR/tCO2e"
    mandatory: false
    value_path: carbon_pricing.internal_carbon_price_eur_per_tco2e
    validation: {min: 0}

  # --- DR E1-11: Antizipierte finanzielle Effekte ------------------------
  - id: E1-DP-027
    dr: E1-11
    name: "Assets at material physical risk (monetary)"
    name_de: "Vermoegenswerte mit materiellem physischem Risiko (monetaer)"
