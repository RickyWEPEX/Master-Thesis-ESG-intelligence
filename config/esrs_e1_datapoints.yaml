  - id: E1-DP-043
    dr: E1-11
    name: "Climate-related financial risk exposure (transition risk, Mio EUR)"
    name_de: "Klimabezogene finanzielle Risikoexposition Transitionsrisiken (Mio. EUR)"
    category: financial_effects
    datatype: numeric
    unit: "Mio EUR"
    mandatory: false
    value_path: financial_effects.transition_risk_exposure_mio_eur
